<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
<style>
   header{
            width:100%;
            height:100vh;
            background-size: cover;
            font-family: sans-serif;
        }
    .text{
      text-decoration: none;
      background: indianred;
      color: white;
      padding: 10px 20px;
      letter-spacing: 5px;
      padding: 10px 20px;
      transition: 0.4s;
  }
</style>
<meta lang="eng" charset="utf-8">

<script>

    function calculateTemp(){

        var x = document.getElementById("i_temp").value ;

        var displayString ="";
        var y = document.querySelector('input[name="radio"]:checked').value;

        if (y=="Celsius"){

          var z=(x*1.8)+32;

          

          displayString= "Temperature is " + z + " Farenheit" ;


        }

        else{

          var z=(x-32)/1.8;

          displayString= "Temperature is " + z + " Farenheit" ;

        }

        

        document.getElementById("convertedTemp").innerHTML=  displayString;

    }

</script>
</head>
<body>
<header>
  <section class="text">
  <input type="number" placeholder="Enter Temperature" name="i_temp" id="i_temp"><br><br>

  <input type="radio" id="Celsius" name="radio" value="Celsius" checked>

  <label for="Celsius">Celsius</label>

  <input type="radio" id="Farenheit" name="radio" value="Farenheit">

  <label for="Farenheit"> Farenheit</label><br><br>

  <button onclick="calculateTemp()"> Convert</button>

  <p id="convertedTemp"></p>

  </section>
</header>
  

  


</body>
